suite: serviceaccount
templates:
  - serviceaccount.tpl
  - _helpers.tpl
tests:
  - it: is created by default and does not automount the token
    template: serviceaccount.tpl
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: is not rendered when create is false
    template: serviceaccount.tpl
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
